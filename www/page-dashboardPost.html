<!DOCTYPE html>
<html lang="ny">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderSlapp - Followed Feed</title>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    
    <style>
        body { font-family: system-ui; background: #fff; margin: 0; padding-bottom: 20px; color: #1c1e21; overflow-x: hidden; }
        .feed-container { max-width: 550px; margin: auto; padding: 0; }

        /* POST CARD STYLES */
        .post-card { background: white; padding: 15px; border-bottom: 8px solid #f0f2f5; position: relative; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; }
        .post-header img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: #eee; }
        .post-header .meta { display: flex; flex-direction: column; }
        .post-header b { font-size: 15px; color: #0a2b4f; }
        .post-header small { font-size: 11px; color: #65676b; }
        
        .post-content { font-size: 15px; margin-bottom: 8px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .clamp-text { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .see-btn { color: #0a2b4f; font-weight: bold; cursor: pointer; display: none; margin-bottom: 10px; font-size: 14px; }
        
        .media-grid { display: grid; gap: 5px; grid-template-columns: 1fr 1fr; margin-top: 5px; border-radius: 12px; overflow: hidden; background: #f0f2f5; }
        .media-grid.single { grid-template-columns: 1fr; }
        .media-item { position: relative; width: 100%; height: 300px; background: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
        
        .play-overlay { position: absolute; font-size: 45px; color: white; opacity: 0.8; z-index: 5; pointer-events: none; }
        .more-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; }

        .post-actions { display: flex; justify-content: space-between; border-top: 1px solid #eee; padding-top: 12px; margin-top: 10px; }
        .action-btn { cursor: pointer; color: #65676b; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; background: none; border: none; }
        .action-btn i { font-size: 22px; } 
        .liked i { color: #0a2b4f; }

        /* SKELETON BOX STYLES */
        .skeleton-wrapper { padding: 15px; border-bottom: 8px solid #f0f2f5; background: #fff; }
        .shimmer { 
            background: #e6e6e6; 
            background-image: linear-gradient(to right, #e6e6e6 0%, #ffffff 50%, #e6e6e6 100%); 
            background-repeat: no-repeat; 
            background-size: 800px 100%; 
            animation: placeholderShimmer 1s linear infinite; 
        }
        @keyframes placeholderShimmer { 0%{background-position: -468px 0} 100%{background-position: 468px 0} }
        
        .sk-head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .sk-avatar { width: 50px; height: 50px; border-radius: 12px; flex-shrink: 0; }
        .sk-name-box { height: 18px; width: 140px; border-radius: 6px; }
        .sk-content-box { height: 60px; width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .sk-media-box { height: 280px; width: 100%; border-radius: 12px; }

        #loadMoreBtn { display: none; width: 90%; margin: 20px auto; padding: 14px; background: #0a2b4f; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #bottomLoader { display: none; text-align: center; padding: 20px; font-size: 14px; color: #65676b; font-weight: 500; }
    </style>
</head>
<body>

<div class="feed-container">
    <div id="skeletonLoader">
        <script>
            for(let i=0; i<4; i++) {
                document.write(`
                <div class="skeleton-wrapper">
                    <div class="sk-head">
                        <div class="sk-avatar shimmer"></div>
                        <div class="sk-name-box shimmer"></div>
                    </div>
                    <div class="sk-content-box shimmer"></div>
                    <div class="sk-media-box shimmer"></div>
                </div>`);
            }
        </script>
    </div>
    
    <div id="postsFeed"></div>
    <div id="bottomLoader"></div>
    <button id="loadMoreBtn" onclick="loadMore()">See More Posts</button>
</div>

<script src="page-monetize.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyDt_ayoflnFkRRnS2fXITY2EzJz0KcW5QA",
    authDomain: "makert-bfb76.firebaseapp.com",
    databaseURL: "https://makert-bfb76-default-rtdb.firebaseio.com",
    projectId: "makert-bfb76",
    storageBucket: "makert-bfb76.firebasestorage.app",
    messagingSenderId: "245693362931",
    appId: "1:245693362931:web:e15662a22dd50d2ac63d86"
};
firebase.initializeApp(firebaseConfig);
const rtdb = firebase.database();
const db = firebase.firestore();
const auth = firebase.auth();

let myID, allPostsCache = [], displayedCount = 0;
let followedPageIds = [], pageDetails = {};
const limit = 10;
let isLoadingMore = false;

auth.onAuthStateChanged(async user => {
    if(user) {
        myID = user.uid;
        await getFollowedPages();
        initialLoad();
    }
});

async function getFollowedPages() {
    followedPageIds = [];
    const [followedSnap, myPagesSnap] = await Promise.all([
        db.collection("pages").where("followers", "array-contains", myID).get(),
        db.collection("pages").where("owner", "==", myID).get()
    ]);
    followedSnap.forEach(doc => { followedPageIds.push(doc.id); pageDetails[doc.id] = doc.data(); });
    myPagesSnap.forEach(doc => { 
        if(!followedPageIds.includes(doc.id)) {
            followedPageIds.push(doc.id); 
            pageDetails[doc.id] = doc.data(); 
        }
    });
}

function initialLoad() {
    if (followedPageIds.length === 0) {
        document.getElementById("skeletonLoader").style.display = "none";
        document.getElementById("postsFeed").innerHTML = "<div style='padding:50px; text-align:center; color:#65676b;'>Follow pages to see posts.</div>";
        return;
    }

    rtdb.ref("pagePosts").orderByChild("createdAt").limitToLast(150).once('value', snap => {
        document.getElementById("skeletonLoader").style.display = "none";
        allPostsCache = [];
        snap.forEach(child => {
            const p = child.val();
            if (followedPageIds.includes(p.pageId)) {
                allPostsCache.push({id: child.key, ...p});
            }
        });
        allPostsCache.sort((a, b) => b.createdAt - a.createdAt);
        loadMore(); 
    });
}

function loadMore() {
    if (isLoadingMore || (allPostsCache.length > 0 && displayedCount >= allPostsCache.length)) return;
    isLoadingMore = true;
    
    const btn = document.getElementById("loadMoreBtn");
    const loader = document.getElementById("bottomLoader");
    btn.style.display = "none";
    if (displayedCount > 0) loader.style.display = "block";

    setTimeout(() => {
        const nextBatch = allPostsCache.slice(displayedCount, displayedCount + limit);
        renderPosts(nextBatch);
        displayedCount += nextBatch.length;

        loader.style.display = "none";
        if (displayedCount < allPostsCache.length) btn.style.display = "block";
        isLoadingMore = false;
        window.parent.postMessage({ type: "SET_HEIGHT", height: document.body.scrollHeight }, "*");
    }, 400); 
}

window.onscroll = function() {
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 600) {
        loadMore();
    }
};

function renderPosts(posts) {
    const feed = document.getElementById("postsFeed");
    posts.forEach(p => {
        const pageData = pageDetails[p.pageId] || { name: "Page", profilePhoto: "" };
        let mediaHtml = "";
        
        if(p.media && p.media.length > 0) {
            const count = p.media.length;
            if(count === 1) {
                mediaHtml = `<div class="media-grid single"><div class="media-item" onclick='openGallery(${JSON.stringify(p.media)}, 0)'>${p.media[0].type === "video" ? '<i class="fi fi-sr-play play-overlay"></i><video src="'+p.media[0].url+'#t=0.5"></video>' : '<img src="'+p.media[0].url+'">'}</div></div>`;
            } else {
                mediaHtml = `<div class="media-grid">
                    <div class="media-item" onclick='openGallery(${JSON.stringify(p.media)}, 0)'>${p.media[0].type === "video" ? '<i class="fi fi-sr-play play-overlay"></i><video src="'+p.media[0].url+'#t=0.5"></video>' : '<img src="'+p.media[0].url+'">'}</div>
                    <div class="media-item" onclick='openGallery(${JSON.stringify(p.media)}, 1)'>${p.media[1].type === "video" ? '<i class="fi fi-sr-play play-overlay"></i><video src="'+p.media[1].url+'#t=0.5"></video>' : '<img src="'+p.media[1].url+'">'} ${count > 2 ? `<div class="more-box">+${count - 2}</div>` : ''}</div>
                </div>`;
            }
        }

        const card = document.createElement("div");
        card.className = "post-card";
        card.innerHTML = `
            <div class="post-header" onclick="window.parent.location.href='pageProfile.html?pageId=${p.pageId}'">
                <img src="${pageData.profilePhoto || 'https://i.ibb.co/7z5nDqK/avatar.png'}">
                <div class="meta"><b>${pageData.name}</b><small>${timeAgo(p.createdAt)}</small></div>
            </div>
            ${p.text ? `<div class="post-content clamp-text" id="txt_${p.id}">${linkify(p.text)}</div><span class="see-btn" id="btn_${p.id}" onclick="toggleText('txt_${p.id}','btn_${p.id}')">See more</span>` : ''}
            ${mediaHtml}
            <div class="post-actions">
                <div class="action-btn" id="l_${p.id}" onclick="toggleLike('${p.id}', '${p.pageId}')">
                    <i class="fi fi-sr-thumbs-up"></i> <span id="lc_${p.id}">0</span>
                </div>
                <div class="action-btn" onclick="openComments('${p.id}','${p.pageId}')">
                    <i class="fi fi-sr-comment-alt"></i> <span id="cc_${p.id}">0</span>
                </div>
                <div class="action-btn" onclick="openShare('${p.id}', '${p.pageId}')">
                    <i class="fi fi-rr-share"></i>
                </div>
            </div>`;
        
        feed.appendChild(card);
        syncStats(p.id);
        checkClamping(p.id);
    });
}

function syncStats(pid) {
    rtdb.ref(`postStats/${pid}/likes`).on('value', s => { 
        if(document.getElementById(`lc_${pid}`)) document.getElementById(`lc_${pid}`).innerText = s.numChildren(); 
        if(document.getElementById(`l_${pid}`)) document.getElementById(`l_${pid}`).classList.toggle("liked", s.hasChild(myID)); 
    });
    rtdb.ref(`postStats/${pid}/comments`).on('value', s => { if(document.getElementById(`cc_${pid}`)) document.getElementById(`cc_${pid}`).innerText = s.numChildren(); });
}

function checkClamping(pid) {
    setTimeout(() => {
        const el = document.getElementById(`txt_${pid}`);
        if(el && el.scrollHeight > el.offsetHeight) document.getElementById(`btn_${pid}`).style.display = 'inline-block';
        window.parent.postMessage({ type: "SET_HEIGHT", height: document.body.scrollHeight }, "*");
    }, 500);
}

function toggleText(tid, bid) {
    const el = document.getElementById(tid);
    el.classList.toggle('clamp-text');
    document.getElementById(bid).innerText = el.classList.contains('clamp-text') ? "See more" : "See less";
    window.parent.postMessage({ type: "SET_HEIGHT", height: document.body.scrollHeight }, "*");
}

function timeAgo(ts) {
    if(!ts) return "now";
    const s = Math.floor((new Date() - new Date(ts)) / 1000);
    if (s < 60) return "now";
    if (s < 3600) return Math.floor(s/60) + "m";
    if (s < 86400) return Math.floor(s/3600) + "h";
    return Math.floor(s/86400) + "d";
}

function linkify(text) {
    if(!text) return "";
    let t = text.replace(/(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig, '<a href="$1" target="_blank">$1</a>');
    t = t.replace(/#(\w+)/g, '<a href="search.html?q=%23$1" target="_top">#$1</a>');
    return t;
}

// TOGGLELIKE KONZEDWA: Ikutumiza ku Monetization kaye
function toggleLike(pid, pageID) {
    if (typeof growPage === 'function') growPage('like', pageID);
    const ref = rtdb.ref(`postStats/${pid}/likes/${myID}`);
    ref.once('value', s => { if(s.exists()) ref.remove(); else ref.set(true); });
}

function openComments(pid, ownerID) { 
    // ownerID pano ndi Page ID
    window.parent.postMessage({ type: "OPEN_COMMENTS", pid: pid, ownerID: ownerID }, "*"); 
}

function openShare(pid, pageID) { 
    if (typeof growPage === 'function') growPage('share', pageID);
    window.parent.postMessage({ type: "OPEN_SHARE", pid: pid }, "*"); 
}

function openGallery(media, idx) {
    let content = media[idx].type === "video" ? `<video src="${media[idx].url}" controls autoplay style="width:100%;"></video>` : `<img src="${media[idx].url}" style="width:100%;">`;
    window.parent.postMessage({ type: "FULL_SCREEN", content: content }, "*");
}
</script>
<script src="post-market.js"></script>
<script src="app-engine.js"></script> 
<script src="user-ads.js"></script>
<script src="cordova.js"></script>
<script src="backgroundNotfi.js"></script> 
</body>
</html>
