<!DOCTYPE html>
<html lang="ny">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WanderSlapp - Page Messaging</title>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
    <style>
        :root { --bg: #0a142b; --text: #f6fbff; --accent: #25d366; }
        body { font-family: system-ui; margin: 0; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: var(--bg); color: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; height: 60px; z-index: 1000; flex-shrink: 0; }
        .header-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        #headerPic { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #ccc; }
        .status-box { display: flex; flex-direction: column; }
        #userStatus { font-size: 11px; color: #25d366; }

        #friendListSection { flex: 1; overflow-y: auto; padding: 10px; display: none; }
        .friend-card { background: white; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid #ddd; }
        .friend-card img { width: 48px; height: 48px; border-radius: 50%; }

        #chatSection { display: none; flex: 1; flex-direction: column; background: #e5ddd5; position: relative; overflow: hidden; }
        #messagesContainer { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 120px; }
        
        .msg { max-width: 80%; padding: 10px; border-radius: 15px; font-size: 14px; position: relative; word-wrap: break-word; }
        .sent { align-self: flex-end; background: #0a2b4f; color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: white; color: black; border-bottom-left-radius: 2px; }

        .input-area { background: white; padding: 12px; display: flex; align-items: center; gap: 8px; position: absolute; bottom: 20px; left: 10px; right: 10px; z-index: 2000; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .input-area input { flex: 1; padding: 12px 5px; border: none; outline: none; font-size: 16px; background: transparent; }
        .icon-btn { cursor: pointer; font-size: 24px; color: #0a2b4f; }
        #recTimerLabel { font-size: 14px; color: red; font-weight: bold; display: none; margin-left: 10px; }
        .chat-img { width: 200px; border-radius: 10px; cursor: pointer; }
        .voice-play { background: #25d366; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="goBack()" style="cursor:pointer; font-size:20px;">←</div>
    <div class="header-info">
        <img id="headerPic" src="https://i.ibb.co/7z5nDqK/avatar.png">
        <div class="status-box">
            <b id="chatTitle">Kutsegula...</b>
            <span id="userStatus">online</span>
        </div>
    </div>
</div>

<div id="friendListSection"><div id="friendsContainer"></div></div>

<div id="chatSection">
    <div id="messagesContainer"></div>
    <div class="input-area">
        <label for="imgInput" id="imgLabel" class="icon-btn"><i class="fi fi-rr-picture"></i></label>
        <input type="file" id="imgInput" accept="image/*" multiple hidden onchange="uploadImages(this.files)">
        <span id="recTimerLabel">0:00</span>
        <input type="text" id="messageInput" placeholder="Lembani uthenga..." oninput="handleTyping()">
        <div id="actionBtnSlot"><i class="fi fi-sr-microphone icon-btn" onclick="toggleRecording()"></i></div>
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const pageID = urlParams.get('pageId'); 

const firebaseConfig = { 
    apiKey: "AIzaSyDt_ayoflnFkRRnS2fXITY2EzJz0KcW5QA",
    authDomain: "makert-bfb76.firebaseapp.com",
    databaseURL: "https://makert-bfb76-default-rtdb.firebaseio.com",
    projectId: "makert-bfb76",
    storageBucket: "makert-bfb76.firebasestorage.app",
    messagingSenderId: "245693362931",
    appId: "1:245693362931:web:e15662a22dd50d2ac63d86"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(), rtdb = firebase.database(), auth = firebase.auth();

let myID, activeChatterID;
let mediaRecorder, audioChunks = [], isRecording = false;

auth.onAuthStateChanged(user => {
    if(user) {
        myID = user.uid;
        initApp();
    }
});

async function initApp() {
    if(!pageID) return alert("Vuto: Page ID sakuoneka!");

    // 1. Tenga details ya Page mwachangu kuti header isonyeze dzina
    const pDoc = await db.collection("pages").doc(pageID).get();
    if(!pDoc.exists) return alert("Page iyi sikupezeka!");
    const pData = pDoc.data();

    // 2. Ngati amene walowa ndi mwini page (Admin)
    if (pData.owner === myID) {
        document.getElementById("chatTitle").innerText = "Mauthenga a Page";
        document.getElementById("headerPic").src = pData.profilePhoto;
        document.getElementById("friendListSection").style.display = "block";
        loadInteractedPeople();
    } else {
        // 3. Ngati ndi User (Kafika mu Chat box yopita kwa Admin)
        activeChatterID = myID; 
        document.getElementById("chatTitle").innerText = pData.name;
        document.getElementById("headerPic").src = pData.profilePhoto;
        document.getElementById("chatSection").style.display = "flex";
        startChat();
    }
}

function loadInteractedPeople() {
    const container = document.getElementById("friendsContainer");
    rtdb.ref(`page_messages/${pageID}`).on('value', snap => {
        container.innerHTML = "";
        if(!snap.exists()) {
            container.innerHTML = "<p style='text-align:center; padding-top:50px;'>Palibe mauthenga.</p>";
            return;
        }
        snap.forEach(child => {
            const userID = child.key;
            db.collection("users").doc(userID).get().then(uDoc => {
                const u = uDoc.data();
                const div = document.createElement("div");
                div.className = "friend-card";
                div.onclick = () => {
                    activeChatterID = userID;
                    document.getElementById("chatTitle").innerText = u.fullName;
                    document.getElementById("headerPic").src = u.profilePhoto || 'https://i.ibb.co/7z5nDqK/avatar.png';
                    document.getElementById("friendListSection").style.display = "none";
                    document.getElementById("chatSection").style.display = "flex";
                    startChat();
                };
                div.innerHTML = `<img src="${u.profilePhoto || 'https://i.ibb.co/7z5nDqK/avatar.png'}"><b>${u.fullName}</b>`;
                container.appendChild(div);
            });
        });
    });
}

function startChat() {
    const container = document.getElementById("messagesContainer");
    container.innerHTML = "";
    rtdb.ref(`page_messages/${pageID}/${activeChatterID}`).on('child_added', snap => {
        const m = snap.val();
        const div = document.createElement("div");
        div.className = `msg ${m.sender === myID ? 'sent' : 'received'}`;
        
        if(m.type === "image") div.innerHTML = `<img src="${m.url}" class="chat-img">`;
        else if(m.type === "voice") div.innerHTML = `<div class="voice-play" onclick="new Audio('${m.url}').play()"><i class="fi fi-sr-play"></i></div> Voice`;
        else div.innerHTML = `<span>${m.text}</span>`;
        
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    });
}

function sendMessage() {
    const input = document.getElementById("messageInput");
    const txt = input.value.trim();
    if(!txt) return;
    rtdb.ref(`page_messages/${pageID}/${activeChatterID}`).push({
        sender: myID, text: txt, type: "text", timestamp: Date.now()
    });
    input.value = "";
}

function handleTyping() {
    const txt = document.getElementById("messageInput").value.trim();
    document.getElementById("actionBtnSlot").innerHTML = txt.length > 0 ? 
        `<i class="fi fi-sr-paper-plane icon-btn" onclick="sendMessage()"></i>` : 
        `<i class="fi fi-sr-microphone icon-btn" onclick="toggleRecording()"></i>`;
}

// Voice ndi Image zimagwira chimodzimodzi ndi m'mene munalembera
async function toggleRecording() {
    if (!isRecording) {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream); audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const blob = new Blob(audioChunks, { type: 'audio/mp3' });
            const fd = new FormData(); fd.append("file", blob); fd.append("upload_preset", "WanderSlapp");
            const res = await fetch(`https://api.cloudinary.com/v1_1/dmu7ctilf/video/upload`, {method:"POST", body:fd});
            const data = await res.json();
            rtdb.ref(`page_messages/${pageID}/${activeChatterID}`).push({ sender: myID, type: "voice", url: data.secure_url, timestamp: Date.now() });
        };
        mediaRecorder.start(); isRecording = true;
        document.getElementById("recTimerLabel").style.display = "block";
    } else {
        mediaRecorder.stop(); isRecording = false;
        document.getElementById("recTimerLabel").style.display = "none";
    }
}

async function uploadImages(files) {
    for (let f of files) {
        const fd = new FormData(); fd.append("image", f);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=dba8c1151016eeb9f9826939c6ca5107`, {method:"POST", body:fd});
        const data = await res.json();
        rtdb.ref(`page_messages/${pageID}/${activeChatterID}`).push({ sender: myID, type: "image", url: data.data.url, timestamp: Date.now() });
    }
}

function goBack() {
    if (document.getElementById("chatSection").style.display === "flex" && document.getElementById("friendListSection").style.display === "none") {
         location.reload(); 
    } else { window.history.back(); }
}
</script>
<script src="cordova.js"></script>
<script src="backgroundNotfi.js"></script> 
</body>
</html>
