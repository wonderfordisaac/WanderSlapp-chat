<!DOCTYPE html>
<html lang="ny">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - WanderSlapp</title>
    
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css">
    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #f8f9fa;
            --header-bg: #0a142b;
            --card-bg: #ffffff;
            --text-main: #0a2b4f;
            --accent: #28a745;
            --border: #eeeeee;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            background: var(--header-bg);
            padding: 18px 15px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .back-link { color: white; text-decoration: none; display: flex; align-items: center; cursor: pointer; border: none; background: none; font-size: 18px; }
        header h2 { margin: 0; font-size: 18px; font-weight: 800; }

        .settings-container {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .setting-item {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: 0.2s;
            cursor: pointer;
            position: relative;
        }

        .setting-item:active { transform: scale(0.95); }

        .setting-item i {
            font-size: 22px;
            width: 30px;
            text-align: center;
            color: var(--accent);
        }

        .setting-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .setting-info b { font-size: 15px; }
        .setting-info span { font-size: 12px; color: #65676b; }
        .chevron { font-size: 14px; color: #ccc; }
        .section-label { margin: 15px 0 5px 10px; font-size: 12px; font-weight: bold; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <a id="backBtn" class="back-link"><i class="fi fi-sr-arrow-left"></i></a>
    <h2>SETTINGS</h2>
</header>

<div class="settings-container">
    
    <div class="section-label">Account Settings</div>

    <a data-url="PageProfile-edt.html" class="setting-item">
        <i class="fi fi-sr-user-pen" style="color: #007bff;"></i>
        <div class="setting-info">
            <b>Edit Profile</b>
            <span>Edit page details</span>
        </div>
        <i class="fi fi-rr-angle-small-right chevron"></i>
    </a>

    <a data-url="pageRemov.html" class="setting-item">
        <i class="fi fi-sr-lock" style="color: #ff9500;"></i>
        <div class="setting-info">
            <b>Dander zone</b>
            <span>Manage page security</span>
        </div>
        <i class="fi fi-rr-angle-small-right chevron"></i>
    </a>

    <div class="section-label">App Preferences</div>

    <a data-url="worknow1.html" class="setting-item">
        <i class="fi fi-sr-text-width" style="color: #6f42c1;"></i>
        <div class="setting-info">
            <b>Text Size</b>
            <span>Change Text size</span>
        </div>
        <i class="fi fi-rr-angle-small-right chevron"></i>
    </a>

    <a data-url="worknow1.html" class="setting-item">
        <i class="fi fi-sr-moon" style="color: #1c1e21;"></i>
        <div class="setting-info">
            <b>Dark Mode</b>
            <span> (Coming Soon)</span>
        </div>
        <i class="fi fi-rr-angle-small-right chevron"></i>
    </a>

    <div class="section-label">Support</div>

    <a data-url="worknow1.html" class="setting-item">
        <i class="fi fi-sr-text-width" style="color: #6f42c1;"></i>
        <div class="setting-info">
            <b>Help & Support</b>
            <span>Contact with us</span>
        </div>
        <i class="fi fi-rr-angle-small-right chevron"></i>
    </a>

</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDt_ayoflnFkRRnS2fXITY2EzJz0KcW5QA",
        authDomain: "makert-bfb76.firebaseapp.com",
        databaseURL: "https://makert-bfb76-default-rtdb.firebaseio.com",
        projectId: "makert-bfb76",
        storageBucket: "makert-bfb76.firebasestorage.app",
        messagingSenderId: "245693362931",
        appId: "1:245693362931:web:e15662a22dd50d2ac63d86"
    };

    firebase.initializeApp(firebaseConfig);

    // --- NJIRA YEFANANA NDI YA KU MENU.HTML ---
    const urlParams = new URLSearchParams(window.location.search);
    const pageID = urlParams.get('pageId'); // Tapanga capitalize 'D' monga ku Menu

    function setupSettingsLinks() {
        if (!pageID) return; 

        // Sinthani Back Button kuti ibwerere ku menu.html ndi ID
        document.getElementById('backBtn').href = `page-menu.html?pageId=${pageID}`;

        // Sinthani ma link onse a setting-item omwe ali ndi data-url
        const settingsItems = document.querySelectorAll('.setting-item[data-url]');
        settingsItems.forEach(item => {
            const baseUrl = item.getAttribute('data-url');
            // Ikani pageId kumapeto kwa file iliyonse
            item.href = `${baseUrl}?pageId=${pageID}`;
        });
    }

    // Itanani function-yi kuti ma link akonzedwe nthawi yomweyo
    setupSettingsLinks();

</script>

</body>
</html>
